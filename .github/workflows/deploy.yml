name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Build English edition
        run: mdbook build site/en

      - name: Build Chinese edition
        run: mdbook build site/zh

      - name: Combine builds with landing page
        run: |
          mkdir -p site/build/combined
          cp -r site/build/en site/build/combined/en
          cp -r site/build/zh site/build/combined/zh
          cat > site/build/combined/index.html << 'LANDING'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Claude Code VS OpenCode</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background: #1a1a2e; color: #eee;
                min-height: 100vh; display: flex; flex-direction: column;
                align-items: center; justify-content: center;
              }
              .container { text-align: center; padding: 2rem; max-width: 600px; }
              h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
              h1 span { color: #6c9bff; }
              h2 { font-size: 1.1rem; font-weight: 400; color: #aaa; margin-bottom: 2rem; }
              .subtitle { font-size: 0.95rem; color: #888; margin-bottom: 3rem; line-height: 1.6; }
              .links { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
              a {
                display: inline-block; padding: 1rem 2.5rem; border-radius: 8px;
                text-decoration: none; font-size: 1.1rem; font-weight: 600;
                transition: transform 0.15s, box-shadow 0.15s;
              }
              a:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
              .en { background: #2d5aa0; color: #fff; }
              .zh { background: #a0452d; color: #fff; }
              footer { margin-top: 3rem; font-size: 0.8rem; color: #555; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Claude Code <span>VS</span> OpenCode</h1>
              <h2>Architecture, Design & The Road Ahead</h2>
              <p class="subtitle">
                An in-depth analysis comparing OpenCode, Oh-My-OpenCode, and Claude Code.<br>
                26 chapters &middot; 6 appendices &middot; ~120,000 words
              </p>
              <div class="links">
                <a href="en/index.html" class="en">English Edition</a>
                <a href="zh/index.html" class="zh">中文版</a>
              </div>
              <footer>Built with mdBook &middot; Open Source on GitHub</footer>
            </div>
          </body>
          </html>
          LANDING

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/build/combined

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
